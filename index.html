<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <script defer src="./js/script.js"></script>
  <title>Odin | Calculator</title>
</head>
<body>  
  <div class="calculator">
    <div class="calculator__display">
      <p class="display__operation"></p>
      <p class="display__result"></p>
    </div>
    <div class="calculator__body">
      <button class="calculator__btn btn__digit" data-value="0">0</button>
      <button class="calculator__btn btn__digit" data-value="1">1</button>
      <button class="calculator__btn btn__digit" data-value="2">2</button>
      <button class="calculator__btn btn__digit" data-value="3">3</button>
      <button class="calculator__btn btn__digit" data-value="4">4</button>
      <button class="calculator__btn btn__digit" data-value="5">5</button>
      <button class="calculator__btn btn__digit" data-value="6">6</button>
      <button class="calculator__btn btn__digit" data-value="7">7</button>
      <button class="calculator__btn btn__digit" data-value="8">8</button>
      <button class="calculator__btn btn__digit" data-value="9">9</button>
      <button class="calculator__btn btn__operator" data-value="+">+</button>
      <button class="calculator__btn btn__operator" data-value="-">-</button>
      <button class="calculator__btn btn__operator" data-value="*">*</button>
      <button class="calculator__btn btn__operator" data-value="/">/</button>
      <button class="calculator__btn btn__operator" data-value="=">=</button>
      <button class="calculator__btn btn__decimal" data-value="decimal">.</button>
      <button class="calculator__btn btn__clear" data-value="clear">C</button>
      <button class="calculator__btn btn__delete" data-value="delete">&#9003</button>
    </div>
  </div>
</body>
</html>
